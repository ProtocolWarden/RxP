repo_key: RxP
src_root: rxp
tests_root: tests

# ---------------------------------------------------------------------------
# Privacy / boundary enforcement (Custodian B-class)
# ---------------------------------------------------------------------------
# Names listed here cause Custodian B1 to fail any tracked file that
# mentions them. Default excludes (.console/**, config/managed_repos/local/**,
# docs/history/**, tools/audit/report/**, .custodian/config.yaml itself)
# spare operator-private and historical surfaces.
privacy:
  require_boundary_artifact: true

# ---------------------------------------------------------------------------
# Audit: per-detector exclusions
# ---------------------------------------------------------------------------
audit:
  cross_repo:
    platform_manifest_repo: ../PlatformManifest

  exclude_paths:
    T7:
      # Contracts, validation, and vocabulary modules are exercised by
      # the contract-tests suite that imports them under different aliases.
      - "rxp/contracts/**"
      - "rxp/validation/**"
      - "rxp/vocabulary/**"
  # F3 contract fields — filled by producing executor, read by consumers in
  # OC/SwitchBoard. Never accessed within rxp/ itself by design (this IS the
  # contract). Field-name exempt list, not path-based, since F3 reports per
  # field name across the codebase.
  f3_exempt:
    - artifact_directory
    - error_summary
    - exit_code
    - input_payload_path
    - output_result_path
    - artifact_index
    - resource_usage
    - runtime_kind
    - stderr_path
    - stdout_path
    - timeout_seconds
